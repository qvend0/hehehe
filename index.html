<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tín Hiệu Bí Ẩn</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.stars{
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(white 1px, transparent 1px);
    background-size:40px 40px;
    opacity:.15;
    animation:move 20s linear infinite;
}

@keyframes move{
    from{transform:translateY(0);}
    to{transform:translateY(100px);}
}

.box{
    text-align:center;
    z-index:2;
}

.title{
    color:white;
    font-size:30px;
    letter-spacing:4px;
    margin-bottom:15px;
    text-shadow:0 0 15px white;
}

.desc{
    color:#999;
    margin-bottom:25px;
    animation:blink 2s infinite;
}

@keyframes blink{
    50%{opacity:.4;}
}

button{
    padding:15px 35px;
    font-size:18px;
    color:white;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.2);
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
    backdrop-filter:blur(10px);
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px rgba(255,255,255,.3);
}

#vipro{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    visibility:hidden;
    transition:1s;
    z-index:99;
}

#vipro.show{
    opacity:1;
    visibility:visible;
}

#vipro img{
    width:340px;
    max-width:85%;
    border-radius:20px;
    box-shadow:0 0 40px rgba(255,255,255,.25);
    transform:scale(.2) rotate(-15deg);
    transition:1s cubic-bezier(.17,.89,.32,1.49);
}

#vipro.show img{
    transform:scale(1) rotate(0deg);
}

#text{
    margin-top:25px;
    color:#fff;
    font-size:30px;
    font-weight:bold;
    text-shadow:0 0 15px white;
    min-height:40px;
}

.cursor{
    animation:cursor .8s infinite;
}

@keyframes cursor{
    50%{
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="box">
    <div class="title">TÍN HIỆU LẠ ĐÃ ĐƯỢC PHÁT HIỆN</div>
    <div class="desc">
        Chỉ một số ít người dám mở nội dung này...
    </div>

    <button onclick="openSecret()">
        XEM TÍN HIỆU
    </button>
</div>

<div id="vipro">
    <!-- Thay ảnh này bằng ảnh của bạn -->
    <img src="https://files.catbox.moe/g2gp7r.jpeg" alt="VIPRO">

    <div id="text">
        <span class="cursor">|</span>
    </div>
</div>

<script>
function openSecret(){

    const vipro = document.getElementById("vipro");
    vipro.classList.add("show");

    const textDiv = document.getElementById("text");

    setTimeout(() => {

        textDiv.innerHTML = "";

        const message = "HẾT HỒN CHƯA? 😂";

        let i = 0;

        const typing = setInterval(() => {

            textDiv.innerHTML += message.charAt(i);

            i++;

            if(i >= message.length){
                clearInterval(typing);

                textDiv.innerHTML +=
                '<span class="cursor">|</span>';
            }

        }, 120);

    }, 1200);
}
</script>

</body>
</html>
